name: update-readme-stats-cards

on:
  schedule:
    - cron: "0 0 * * *"      # regenerates once a day
  workflow_dispatch: {}        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main                   # regenerates whenever you push to main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=arnavmaheshwari&show_icons=true&theme=tokyonight&hide_border=true&hide=prs,issues,contribs,stars&hide_rank=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=arnavmaheshwari&layout=compact&theme=tokyonight&hide_border=true&hide=jupyter notebook
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - E-KYC Portal
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=arnavmaheshwari&repo=E-KYC_Portal&theme=tokyonight&hide_border=true
          path: profile/pin-ekyc-portal.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - Employee Manager Application
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=arnavmaheshwari&repo=Employee-Manager-Application&theme=tokyonight&hide_border=true
          path: profile/pin-employee-manager.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - Log Classification System
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=arnavmaheshwari&repo=Log-Classification-System&theme=tokyonight&hide_border=true
          path: profile/pin-log-classification.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - Medical Chatbot
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=arnavmaheshwari&repo=Medical-Chatbot&theme=tokyonight&hide_border=true
          path: profile/pin-medical-chatbot.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - Generative AI Projects
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=arnavmaheshwari&repo=Generative-AI-Projects&theme=tokyonight&hide_border=true
          path: profile/pin-genai-projects.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "Update README stats cards" || exit 0
          git push
